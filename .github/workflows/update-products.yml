name: 상품 자동 업데이트

on:
  schedule:
    # 매주 월요일 06:00 KST (= 일요일 21:00 UTC)
    - cron: '0 21 * * 0'
  workflow_dispatch: {}   # GitHub 화면에서 수동 실행 버튼도 제공

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 할인 상품 수집
        run: python scripts/update_products.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "상품 자동 업데이트: $(date +'%Y-%m-%d')"
            git push
          fi
