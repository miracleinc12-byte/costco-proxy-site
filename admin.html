<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>주문 관리 | 위클리카트</title>
<link rel="stylesheet" href="css/style.css">
<style>
.admin-wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }

/* 로그인 게이트 */
.login-gate { text-align:center; padding:100px 24px; }
.login-gate h1 { font-size:24px; font-weight:900; margin-bottom:8px; }
.login-gate p { color:var(--muted); margin-bottom:28px; }

/* 상태 요약 */
.stat-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
.stat-chip { background:#fff; border-radius:10px; padding:14px; text-align:center; box-shadow:var(--shadow); cursor:pointer; border:2px solid transparent; transition:all .15s; }
.stat-chip.active { border-color:var(--primary); }
.stat-chip .n { font-size:24px; font-weight:900; color:var(--primary); }
.stat-chip .l { font-size:12px; color:var(--muted); }

/* 주문 카드 */
.order-card { background:#fff; border-radius:12px; box-shadow:var(--shadow); padding:18px 20px; margin-bottom:14px; }
.order-head { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.order-no { font-weight:900; font-size:16px; color:var(--primary); }
.order-date { font-size:12px; color:var(--muted); }
.order-body { display:grid; grid-template-columns:1fr 1fr; gap:8px 20px; font-size:14px; margin-bottom:12px; }
@media(max-width:700px){ .order-body { grid-template-columns:1fr; } }
.order-body b { color:var(--muted); font-weight:700; font-size:12px; display:block; }
.order-items { background:var(--bg); border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:12px; }
.order-total { font-weight:900; color:var(--red); }

.status-badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; }
.st-입금대기 { background:#FEF3C7; color:#92400E; }
.st-입금확인 { background:#DBEAFE; color:#1E40AF; }
.st-구매완료 { background:#EDE9FE; color:#5B21B6; }
.st-발송완료 { background:#DCFCE7; color:#166534; }
.st-취소 { background:#FEE2E2; color:#991B1B; }

.order-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; border-top:1px solid var(--border); padding-top:12px; }
.order-actions select, .order-actions input {
  padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit;
}
.order-actions input.tracking { width:160px; }
.mini-btn { padding:8px 14px; border-radius:8px; border:none; font-size:13px; font-weight:700; cursor:pointer; background:var(--primary); color:#fff; }
.mini-btn.gray { background:#6B7280; }
.mini-btn:hover { opacity:.88; }
.empty-msg { text-align:center; color:var(--muted); padding:60px; }
#user-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg> 위클리<span>카트</span> <span style="font-size:13px;color:#fff;opacity:.7;margin-left:6px">관리자</span></div>
    <div class="nav-links">
      <a href="index.html">사이트로 이동</a>
    </div>
  </div>
</nav>

<!-- 로그인 전 -->
<div class="login-gate" id="login-gate">
  <h1>🔐 주문 관리</h1>
  <p>관리자 전용 페이지입니다. 구글 계정으로 로그인해주세요.</p>
  <button class="btn btn-primary btn-lg" onclick="login()">구글 계정으로 로그인</button>
</div>

<!-- 로그인 후 -->
<div class="admin-wrap" id="admin-panel" style="display:none">
  <div id="user-bar">
    <div style="display:flex;align-items:center;gap:10px">
      <h1 style="font-size:22px;font-weight:900">📋 관리자</h1>
      <button class="mini-btn" id="tab-orders" onclick="switchView('orders')">주문 관리</button>
      <button class="mini-btn gray" id="tab-board" onclick="switchView('board')">게시판 관리 <span id="inq-badge"></span></button>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="user-email" style="font-size:13px;color:var(--muted)"></span>
      <button class="mini-btn gray" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- 주문 관리 뷰 -->
  <div id="view-orders">
    <div class="stat-row" id="stat-row"></div>
    <div id="order-list"><div class="empty-msg">주문 불러오는 중...</div></div>
  </div>

  <!-- 게시판 관리 뷰 -->
  <div id="view-board" style="display:none">
    <h2 style="font-size:16px;font-weight:900;margin:6px 0 12px">🔒 비밀 문의</h2>
    <div id="inquiry-list"><div class="empty-msg">불러오는 중...</div></div>
    <h2 style="font-size:16px;font-weight:900;margin:26px 0 12px">📝 공개 게시판</h2>
    <div id="board-list"><div class="empty-msg">불러오는 중...</div></div>
  </div>
</div>

<script src="js/cart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script>
const auth = firebase.auth();

const STATUSES = ['입금대기', '입금확인', '구매완료', '발송완료', '취소'];
const COURIERS = ['CJ대한통운', '우체국택배', '한진택배', '롯데택배', '로젠택배'];
let orders = [];
let filterStatus = '전체';
let unsubscribe = null;

function login() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(err => alert('로그인 실패: ' + err.message));
}
function logout() { auth.signOut(); }

auth.onAuthStateChanged(user => {
  document.getElementById('login-gate').style.display = user ? 'none' : 'block';
  document.getElementById('admin-panel').style.display = user ? 'block' : 'none';
  if (user) {
    document.getElementById('user-email').textContent = user.email;
    subscribeOrders();
    subscribeBoard();
  } else if (unsubscribe) {
    unsubscribe();
  }
});

// ── 뷰 전환 (주문 / 게시판) ──
function switchView(v) {
  document.getElementById('view-orders').style.display = v === 'orders' ? 'block' : 'none';
  document.getElementById('view-board').style.display = v === 'board' ? 'block' : 'none';
  document.getElementById('tab-orders').className = 'mini-btn' + (v === 'orders' ? '' : ' gray');
  document.getElementById('tab-board').className = 'mini-btn' + (v === 'board' ? '' : ' gray');
}

function subscribeOrders() {
  unsubscribe = db.collection('orders').orderBy('createdAt', 'desc').limit(300)
    .onSnapshot(snap => {
      orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }, err => {
      document.getElementById('order-list').innerHTML =
        `<div class="empty-msg">⚠️ 주문을 읽을 수 없습니다.<br>보안 규칙이 관리자 읽기를 허용하는지, 관리자 계정(${auth.currentUser?.email})으로 로그인했는지 확인해주세요.<br><small>${err.message}</small></div>`;
    });
}

function fmtDate(ts) {
  if (!ts || !ts.toDate) return '-';
  const d = ts.toDate();
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function render() {
  // 상태별 요약
  const counts = { 전체: orders.length };
  STATUSES.forEach(s => counts[s] = orders.filter(o => o.status === s).length);
  document.getElementById('stat-row').innerHTML =
    ['전체', ...STATUSES].map(s =>
      `<div class="stat-chip ${filterStatus === s ? 'active' : ''}" onclick="setFilter('${s}')">
        <div class="n">${counts[s]}</div><div class="l">${s}</div>
      </div>`).join('');

  const list = filterStatus === '전체' ? orders : orders.filter(o => o.status === filterStatus);
  const wrap = document.getElementById('order-list');
  if (!list.length) {
    wrap.innerHTML = '<div class="empty-msg">해당하는 주문이 없습니다.</div>';
    return;
  }
  wrap.innerHTML = list.map(o => `
    <div class="order-card">
      <div class="order-head">
        <div>
          <span class="order-no">${o.orderNo || o.id}</span>
          <span class="status-badge st-${o.status || '입금대기'}" style="margin-left:8px">${o.status || '입금대기'}</span>
          ${o.rollover ? '<span class="status-badge" style="margin-left:4px;background:#FFE4E6;color:#9F1239">⏭️ 다음 주 이월</span>' : ''}
        </div>
        <span class="order-date">${fmtDate(o.createdAt)}</span>
      </div>
      <div class="order-body">
        <div><b>주문자 / 연락처</b>${esc(o.name)} · ${esc(o.phone)}</div>
        <div><b>카카오톡</b>${esc(o.kakaoId) || '-'}</div>
        <div><b>수령인</b>${esc(o.receiver) || esc(o.name)}</div>
        <div><b>배송지</b>[${esc(o.zipcode)}] ${esc(o.address)} ${esc(o.addressDetail)}</div>
        <div><b>배송 메모</b>${esc(o.deliveryMemo) || '-'}</div>
        <div><b>입금 금액</b><span class="order-total">${(o.totalAmount || 0).toLocaleString()}원</span></div>
      </div>
      <div class="order-items">🛍️ ${esc(o.items)}</div>
      <div class="order-actions">
        <select id="st-${o.id}">
          ${STATUSES.map(s => `<option ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
        <select id="courier-${o.id}">
          ${COURIERS.map(c => `<option ${o.courier === c ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
        <input class="tracking" id="tr-${o.id}" placeholder="운송장 번호" value="${esc(o.trackingNo) || ''}">
        <button class="mini-btn" onclick="saveOrder('${o.id}')"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg> 저장</button>
        <button class="mini-btn gray" onclick="copyMsg('${o.id}')"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg> 고객 안내문 복사</button>
      </div>
    </div>
  `).join('');
}

function setFilter(s) { filterStatus = s; render(); }

async function saveOrder(id) {
  const status = document.getElementById('st-' + id).value;
  const courier = document.getElementById('courier-' + id).value;
  const trackingNo = document.getElementById('tr-' + id).value.trim();
  try {
    await db.collection('orders').doc(id).update({ status, courier, trackingNo });
    alert('저장되었습니다.');
  } catch (err) {
    alert('저장 실패: ' + err.message);
  }
}

// ── 게시판 관리 ──
function subscribeBoard() {
  db.collection('inquiries').orderBy('createdAt', 'desc').limit(100)
    .onSnapshot(snap => {
      const badge = document.getElementById('inq-badge');
      badge.textContent = snap.size ? `(${snap.size})` : '';
      const wrap = document.getElementById('inquiry-list');
      wrap.innerHTML = snap.empty
        ? '<div class="empty-msg">비밀 문의가 없습니다.</div>'
        : snap.docs.map(d => {
            const p = d.data();
            return `
              <div class="order-card">
                <div class="order-head">
                  <span class="post-admin-name"><strong>${esc(p.name)}</strong>
                    <span style="font-size:12px;color:var(--muted);margin-left:8px">📞 ${esc(p.contact) || '연락처 없음'}</span></span>
                  <span class="order-date">${fmtDate(p.createdAt)}</span>
                </div>
                ${p.title ? `<div style="font-weight:900;margin-bottom:6px">${esc(p.title)}</div>` : ''}
                <div style="font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word">${esc(p.content)}</div>
                <div class="order-actions">
                  <span style="font-size:12px;color:var(--muted)">※ 답변은 남긴 연락처로 직접 연락</span>
                  <button class="mini-btn gray" style="margin-left:auto" onclick="deleteDoc('inquiries','${d.id}')"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 삭제</button>
                </div>
              </div>`;
          }).join('');
    });

  db.collection('posts').orderBy('createdAt', 'desc').limit(100)
    .onSnapshot(snap => {
      const wrap = document.getElementById('board-list');
      wrap.innerHTML = snap.empty
        ? '<div class="empty-msg">게시글이 없습니다.</div>'
        : snap.docs.map(d => {
            const p = d.data();
            return `
              <div class="order-card">
                <div class="order-head">
                  <strong>${esc(p.name)}</strong>
                  <span class="order-date">${fmtDate(p.createdAt)}</span>
                </div>
                ${p.title ? `<div style="font-weight:900;margin-bottom:6px">${esc(p.title)}</div>` : ''}
                <div style="font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;margin-bottom:10px">${esc(p.content)}</div>
                <div class="order-actions">
                  <input style="flex:1;min-width:200px" id="rp-${d.id}" placeholder="답변 입력 (게시판에 공개 표시됨)" value="${esc(p.reply) || ''}">
                  <button class="mini-btn" onclick="saveReply('${d.id}')"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 답변 저장</button>
                  <button class="mini-btn gray" onclick="deleteDoc('posts','${d.id}')"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 삭제</button>
                </div>
              </div>`;
          }).join('');
    });
}

async function saveReply(id) {
  const reply = document.getElementById('rp-' + id).value.trim();
  try {
    await db.collection('posts').doc(id).update({ reply });
    alert(reply ? '답변이 등록되었습니다.' : '답변이 삭제되었습니다.');
  } catch (err) { alert('저장 실패: ' + err.message); }
}

async function deleteDoc(col, id) {
  if (!confirm('정말 삭제할까요? 되돌릴 수 없습니다.')) return;
  try { await db.collection(col).doc(id).delete(); }
  catch (err) { alert('삭제 실패: ' + err.message); }
}

function copyMsg(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const lines = [`[위클리카트] ${o.name}님, 안녕하세요!`];
  if (o.status === '발송완료' || o.trackingNo) {
    lines.push(`주문하신 상품이 발송되었습니다. 🚚`);
    lines.push(`· 주문번호: ${o.orderNo || o.id}`);
    lines.push(`· 택배사: ${o.courier || 'CJ대한통운'}`);
    lines.push(`· 운송장번호: ${o.trackingNo || '(입력 후 복사해주세요)'}`);
    lines.push(`네이버에 "${o.courier || 'CJ대한통운'} 택배조회" 검색 후 운송장번호를 입력하시면 배송 조회가 가능합니다.`);
  } else if (o.status === '입금확인' || o.status === '구매완료') {
    lines.push(`입금이 확인되었습니다. 감사합니다! 🙏`);
    lines.push(`· 주문번호: ${o.orderNo || o.id}`);
    lines.push(`수요일 코스트코 구매 후 발송해드리며, 운송장 번호를 다시 안내드리겠습니다.`);
  } else {
    lines.push(`주문이 접수되었습니다.`);
    lines.push(`· 주문번호: ${o.orderNo || o.id}`);
    lines.push(`· 입금 금액: ${(o.totalAmount || 0).toLocaleString()}원`);
    lines.push(`카카오뱅크 3333-00-0000000 (홍길동)으로 입금해주시면 처리가 시작됩니다.`);
  }
  navigator.clipboard.writeText(lines.join('\n'))
    .then(() => alert('안내문이 복사되었습니다. 카카오톡에 붙여넣기 하세요.'));
}
</script>
</body>
</html>
